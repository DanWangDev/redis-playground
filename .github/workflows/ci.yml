name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -m "not integration" -v

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 15
    services:
      redis:
        image: redis/redis-stack:latest
        ports:
          - 6379:6379
        env:
          REDIS_ARGS: "--requirepass playground"
        options: >-
          --health-cmd "redis-cli -a playground ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run integration tests
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: playground
        run: pytest tests/ -m integration -v
      - name: Run exercises against real Redis
        env:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          REDIS_PASSWORD: playground
          NO_PAUSE: 1
        run: |
          for i in $(seq -w 1 21); do
            echo "::group::Exercise $i"
            python -m redis_playground.main --exercise $i --no-step
            echo "::endgroup::"
          done
      - name: Collect Redis logs on failure
        if: failure()
        run: docker logs $(docker ps -q --filter ancestor=redis/redis-stack:latest) --tail=200
