services:
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"    # Redis
      - "8001:8001"    # RedisInsight UI
    environment:
      REDIS_ARGS: "--requirepass playground --appendonly yes"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "playground", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - redis-data:/data

volumes:
  redis-data:
